<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEMO | SELECT SHOP NEXT PDP</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Bodoni+Moda:ital@1&family=Noto+Sans+JP:wght@300;400;700&family=Caveat&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #ff5a00;
            --bg-dark: #121212;
            --text-main: #333333;
            --text-sub: #666666;
            --border-light: #eeeeee;
            --glass-bg: rgba(255, 255, 255, 0.9);
            --glass-blur: blur(12px);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Noto Sans JP', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: #f0f0f2;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            color: var(--text-main);
        }

        .phone-wrapper {
            width: 393px;
            height: 852px;
            background: #ffffff;
            border: 12px solid #000000;
            border-radius: 48px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        .notch {
            position: absolute;
            top: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 110px;
            height: 30px;
            background: #000000;
            border-bottom-left-radius: 18px;
            border-bottom-right-radius: 18px;
            z-index: 9999;
        }

        /* --- ダミーPDP --- */
        .pdp-container {
            flex: 1;
            overflow-y: auto; 
            position: relative;
            background: #ffffff;
        }

        .pdp-header {
            height: 60px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
            border-bottom: 1px solid var(--border-light);
            margin-top: 15px;
            background: #ffffff;
        }
        .brand-logo {
            font-family: 'Bodoni Moda', serif;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 2px;
        }

        .product-image-area {
            width: 100%;
            height: 540px; 
            background: #ffffff; 
            position: relative;
        }

        .product-info {
            padding: 0 0 100px 0; 
            background: #fcfcfc;
        }

        .size-check-banner {
            background: #1a1a1a;
            color: #ffffff;
            padding: 14px 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: bold;
        }
        .size-check-link {
            border: 1px solid #ffffff;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 11px;
        }

        .pdp-section-box {
            background: #ffffff;
            padding: 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        .color-name-title {
            font-size: 12px;
            color: var(--text-sub);
            margin-bottom: 10px;
        }
        .size-stock-chips {
            display: flex;
            gap: 6px;
            overflow-x: auto;
            margin-bottom: 15px;
        }
        .size-stock-chips::-webkit-scrollbar { display: none; }
        .stock-chip {
            border: 1px solid #dddddd;
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            white-space: nowrap;
        }

        .main-meta-box {
            background: #ffffff;
            padding: 24px 20px;
            border-bottom: 1px solid #f0f0f0;
        }
        .meta-brand {
            font-size: 11px;
            font-weight: bold;
            letter-spacing: 1.5px;
            margin-bottom: 4px;
        }
        .meta-title {
            font-size: 16px;
            font-weight: 700;
            line-height: 1.4;
            margin-bottom: 12px;
        }
        .meta-price-row {
            font-size: 18px;
            font-weight: bold;
        }

        .pdp-footer-action {
            height: 80px;
            padding: 15px 20px;
            border-top: 1px solid var(--border-light);
            display: flex;
            gap: 12px;
            background: #ffffff;
            z-index: 600; 
        }
        .action-btn-main {
            flex: 1;
            background: #111111;
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            font-size: 14px;
        }
        .action-btn-sub {
            width: 50px;
            border: 1px solid #cccccc;
            border-radius: 8px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* --- ストリーミング接客 --- */
        .streaming-container {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; 
            z-index: 500; 
        }

        .flow-summary-card {
            position: absolute;
            left: 16px; right: 16px;
            background: var(--glass-bg);
            backdrop-filter: var(--glass-blur);
            -webkit-backdrop-filter: var(--glass-blur);
            border-radius: 20px;
            padding: 18px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.08);
            opacity: 0;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .flow-summary-card.animate {
            animation: summaryScrollUp 6.5s cubic-bezier(0.22, 1, 0.36, 1) forwards;
        }

        @keyframes summaryScrollUp {
            0% { transform: translateY(750px); opacity: 0; }
            15% { transform: translateY(340px); opacity: 1; }
            75% { transform: translateY(300px); opacity: 1; }
            100% { transform: translateY(-150px); opacity: 0; } 
        }

        .stories-progress-bar { width: 100%; height: 3px; background: rgba(0,0,0,0.08); border-radius: 2px; overflow: hidden; }
        .stories-progress-line { height: 100%; width: 0%; background: #111111; }
        .stories-progress-line.run { transition: width 4.5s linear 0.8s; width: 100%; }
        .staff-header { display: flex; align-items: center; gap: 8px; }
        .staff-avatar { width: 26px; height: 26px; border-radius: 50%; background: #bcbaa9; border: 1px solid var(--primary-color); overflow: hidden; }
        .staff-avatar img { width: 100%; height: 100%; object-fit: cover; }
        .staff-name { font-size: 11px; font-weight: bold; }
        .highlight-word { color: var(--primary-color); font-weight: bold; }

        /* 口コミ */
        .flow-review-item {
            position: absolute;
            background: rgba(17, 17, 17, 0.88);
            color: #ffffff;
            padding: 12px 18px;
            border-radius: 20px;
            font-size: 12px;
            opacity: 0;
            max-width: 250px; 
            word-break: break-word;
        }
        .review-highlight { color: var(--primary-color); font-weight: 700; font-size: 13.5px; }

        @keyframes reviewScrollUp {
            0% { transform: translateY(750px) scale(0.95); opacity: 0; }
            10% { opacity: 1; transform: translateY(540px) scale(1); }
            90% { opacity: 1; }
            100% { transform: translateY(-120px) scale(0.95); opacity: 0; }
        }

        /* 質問ボタン */
        .question-container {
            position: absolute;
            top: 36%; left: 20px; right: 20px;
            display: flex; flex-direction: column; gap: 10px;
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
            z-index: 550; 
            pointer-events: none;
        }
        .question-container.active { opacity: 1; transform: translateY(0); pointer-events: auto; }
        .question-btn {
            background: #ffffff; border: 1px solid #111111; padding: 14px 16px; border-radius: 24px;
            font-size: 13px; font-weight: bold; text-align: left; display: flex; justify-content: space-between; align-items: center;
        }

        /* --- スタッフDM画面 --- */
        .dm-overlay {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.4); z-index: 998; opacity: 0; pointer-events: none; transition: opacity 0.4s ease;
        }
        .dm-overlay.active { opacity: 1; pointer-events: auto; }

        .dm-layer {
            position: absolute;
            bottom: 0; left: 0; width: 100%; height: 65%; 
            background: #ffffff; z-index: 1000;
            transform: translateY(100%); transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex; flex-direction: column;
            border-top-left-radius: 24px; border-top-right-radius: 24px;
        }
        .dm-layer.active { transform: translateY(0); }
        .sheet-handle { width: 40px; height: 4px; background: #e0e0e0; border-radius: 2px; margin: 8px auto 0; }
        
        .dm-header { height: 50px; border-bottom: 1px solid #eeeeee; padding: 0 20px 10px 20px; display: flex; align-items: center; gap: 12px; }
        .dm-back { cursor: pointer; font-size: 18px; }

        .dm-body { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; background: #fafafa; }
        
        /* 修正：Agentのメッセージにはアイコンを表示 */
        .agent-msg-wrapper { display: flex; gap: 8px; align-items: flex-end; align-self: flex-start; max-width: 85%; }
        .agent-mini-avatar { width: 24px; height: 24px; border-radius: 50%; background: #eee; flex-shrink: 0; overflow: hidden; border: 1px solid #ddd; }
        .agent-mini-avatar img { width: 100%; height: 100%; object-fit: cover; }

        .msg {
            padding: 12px 16px; border-radius: 18px; font-size: 13px; line-height: 1.5;
            opacity: 0; transform: translateY(10px); animation: msgFadeIn 0.5s forwards cubic-bezier(0.16, 1, 0.3, 1);
        }
        @keyframes msgFadeIn { to { opacity: 1; transform: translateY(0); } }
        
        .msg.user { background: #111111; color: #ffffff; align-self: flex-end; border-bottom-right-radius: 4px; max-width: 80%; }
        .msg.agent { background: #ffffff; color: var(--text-main); border-bottom-left-radius: 4px; border: 1px solid #e0e0e0; }

        /* カルーセル */
        .dm-carousel {
            display: flex; gap: 10px; overflow-x: auto; padding: 4px 0 4px 32px; width: 100%; scroll-snap-type: x mandatory;
            opacity: 0; animation: msgFadeIn 0.5s forwards 0.4s;
        }
        .dm-carousel::-webkit-scrollbar { display: none; }
        .dm-carousel-item { flex: 0 0 140px; height: 190px; border-radius: 12px; scroll-snap-align: start; position: relative; overflow: hidden; background: #eee; }
        .dm-carousel-item img { width: 100%; height: 100%; object-fit: cover; }
        .dm-carousel-item::after {
            content: attr(data-label); position: absolute; bottom: 8px; left: 8px; font-size: 9px; font-weight: bold; color: #fff;
            background: rgba(0,0,0,0.5); padding: 2px 6px; border-radius: 4px;
        }

        /* 新設：テキスト入力UI */
        .dm-input-area {
            padding: 12px 20px; border-top: 1px solid #eeeeee; background: #ffffff; display: flex; gap: 10px; align-items: center;
        }
        .dm-input-area input {
            flex: 1; border: 1px solid #eeeeee; background: #f8f8f8; padding: 10px 16px; border-radius: 20px; font-size: 13px; outline: none;
        }
        .dm-send-btn { color: var(--primary-color); font-weight: bold; font-size: 14px; cursor: pointer; }

        .dm-footer-action { padding: 15px 20px 25px 20px; background: #ffffff; border-top: 1px solid #eeeeee; display: none; }
        .dm-footer-action.active { display: block; opacity: 1; animation: msgFadeIn 0.6s forwards; }
        .neon-cart-btn { width: 100%; background: #111111; color: #ffffff; border: none; padding: 16px; border-radius: 8px; font-weight: bold; font-size: 14px; }
        .neon-cart-btn.glow { animation: neonPulse 2s infinite alternate; }
        @keyframes neonPulse { 0% { box-shadow: 0 0 4px #fff, 0 0 10px var(--primary-color); } 100% { box-shadow: 0 0 8px #fff, 0 0 20px var(--primary-color); } }
    </style>
</head>
<body>

    <div class="phone-wrapper">
        <div class="notch"></div>

        <div class="pdp-container">
            <div class="pdp-header">
                <span class="brand-logo" style="font-size: 12px; font-weight: 300;">← BACK</span>
                <span class="brand-logo">A-SHOP STANDARD</span>
                <span>🛒</span>
            </div>
            
            <div class="product-image-area">
                <img src="./img/green.jpg" alt="product" style="width: 100%; height: 100%; object-fit: contain;">
            </div>
            
            <div class="product-info">
                <div class="size-check-banner">
                    <span>簡単サイズチェック</span>
                    <span class="size-check-link">比較する ＞</span>
                </div>
                <div class="main-meta-box">
                    <div class="meta-brand">A-SHOP STANDARD</div>
                    <h1 class="meta-title">LOOSE WIDE VINTAGE CHINO PANTS</h1>
                    <div class="meta-price-row">¥16,500 <span style="font-weight:normal; font-size:12px; color:#666;">(税込)</span></div>
                </div>
                <div class="pdp-section-box" style="text-align: center; color: #999; font-size: 12px; padding: 40px;">
                    (SCROLL FOR MORE DETAILS)
                </div>
            </div>
        </div>

        <div class="pdp-footer-action">
            <div class="action-btn-sub">♡</div>
            <button class="action-btn-main">カラー・サイズを選択</button>
        </div>

        <div class="streaming-container" id="streamingContainer">
            <div class="flow-summary-card" id="flowSummary">
                <div class="stories-progress-bar"><div class="stories-progress-line" id="progressLine"></div></div>
                <div class="staff-header">
                    <div class="staff-avatar"><img src="./hikari.jpg" onerror="this.src='https://i.pravatar.cc/100?img=32'"></div>
                    <div class="staff-name">HIKARI (158cm)</div>
                </div>
                <div class="stories-text">ウエストを落として<span class="highlight-word">ずるっと履く</span>のが推し。この<span class="highlight-word">クタッと感が最高</span>。</div>
            </div>
        </div>

        <div class="question-container" id="questionContainer">
            <button class="question-btn" onclick="startDM('ずるっと履くと、地面に引きずりませんか？')">ずるっと履くと、地面に引きずりませんか？</button>
            <button class="question-btn" onclick="startDM('ヨーロッパの空気感を出す着こなしは？')">ヨーロッパの空気感を出す着こなしは？</button>
        </div>

        <div class="dm-overlay" id="dmOverlay" onclick="closeDM()"></div>

        <div class="dm-layer" id="dmLayer">
            <div class="sheet-handle"></div>
            <div class="dm-header">
                <span class="dm-back" onclick="closeDM()">←</span>
                <div class="staff-avatar"><img src="./hikari.jpg" onerror="this.src='https://i.pravatar.cc/100?img=32'"></div>
                <div>
                    <div class="staff-name" style="font-size:14px;">HIKARI | AI Agent</div>
                    <div style="font-size:11px; color:#22c55e;">● オンライン接客中</div>
                </div>
            </div>
            <div class="dm-body" id="dmBody"></div>
            
            <div class="dm-input-area">
                <input type="text" id="dmInput" placeholder="メッセージを入力...">
                <div class="dm-send-btn" onclick="handleSend()">送信</div>
            </div>

            <div class="dm-footer-action" id="dmFooter">
                <button class="neon-cart-btn glow">このサイズ（M）をカートに入れる</button>
            </div>
        </div>
    </div>

    <script>
        const reviewsData = [
            { text: "🔥 生地の<span class='review-highlight'>クタッと感</span>が最高！", left: 16, delay: 0 },
            { text: "160cmだけど<span class='review-highlight'>ずるっと</span>穿けて絶妙な丈！", right: 16, delay: 0.8 }
        ];

        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.getElementById('flowSummary').classList.add('animate');
                document.getElementById('progressLine').classList.add('run');
            }, 2000);
            setTimeout(() => {
                const container = document.getElementById('streamingContainer');
                reviewsData.forEach((data) => {
                    const reviewEl = document.createElement('div');
                    reviewEl.classList.add('flow-review-item');
                    reviewEl.innerHTML = data.text;
                    if (data.left) reviewEl.style.left = `${data.left}px`;
                    if (data.right) reviewEl.style.right = `${data.right}px`;
                    reviewEl.style.animation = `reviewScrollUp 8s cubic-bezier(0.22, 1, 0.36, 1) forwards`;
                    reviewEl.style.animationDelay = `${data.delay}s`;
                    container.appendChild(reviewEl);
                });
            }, 7000);
            setTimeout(() => { document.getElementById('questionContainer').classList.add('active'); }, 15000);
        });

        function startDM(userQuestion) {
            document.getElementById('dmLayer').classList.add('active');
            document.getElementById('dmOverlay').classList.add('active');
            appendMessage(userQuestion, 'user');
            setTimeout(() => {
                let agentReply = "";
                let showCarousel = false;
                if(userQuestion.includes('引きずりませんか')) {
                    agentReply = "大丈夫です！裾がたまターゲットになる計算されたシルエットなので、厚底を合わせれば理想の『ずるっと感』が出ますよ。スタイリングも参考にどうぞ！";
                    showCarousel = true;
                } else {
                    agentReply = "綺麗めなリネンシャツを合わせて足元をローファーにするのがおすすめ。それだけで『ヨーロッパの空気感』が完成します！";
                }
                appendMessage(agentReply, 'agent');
                if(showCarousel) { setTimeout(() => { appendCarousel(); }, 600); }
                setTimeout(() => { document.getElementById('dmFooter').classList.add('active'); }, 1500);
            }, 1200);
        }

        function appendMessage(text, sender) {
            const dmBody = document.getElementById('dmBody');
            if (sender === 'agent') {
                const wrapper = document.createElement('div');
                wrapper.classList.add('agent-msg-wrapper');
                wrapper.innerHTML = `
                    <div class="agent-mini-avatar"><img src="./hikari.jpg" onerror="this.src='https://i.pravatar.cc/100?img=32'"></div>
                    <div class="msg agent">${text}</div>
                `;
                dmBody.appendChild(wrapper);
            } else {
                const msgDiv = document.createElement('div');
                msgDiv.classList.add('msg', 'user');
                msgDiv.innerText = text;
                dmBody.appendChild(msgDiv);
            }
            dmBody.scrollTop = dmBody.scrollHeight;
        }

        function appendCarousel() {
            const dmBody = document.getElementById('dmBody');
            const carouselDiv = document.createElement('div');
            carouselDiv.classList.add('dm-carousel');
            // 本物のスタイリングをイメージしたダミー画像（Unsplash等のお洒落なファッション画像）
            const imgs = [
                {url: 'https://images.unsplash.com/photo-1594633312681-425c7b97ccd1?q=80&w=300&auto=format&fit=crop', label: '158cm / M'},
                {url: 'https://images.unsplash.com/photo-1515886657613-9f3515b0c78f?q=80&w=300&auto=format&fit=crop', label: '162cm / M'},
                {url: 'https://images.unsplash.com/photo-1552374196-1ab2a1c593e8?q=80&w=300&auto=format&fit=crop', label: '153cm / S'}
            ];
            imgs.forEach(img => {
                const item = document.createElement('div');
                item.classList.add('dm-carousel-item');
                item.setAttribute('data-label', img.label);
                item.innerHTML = `<img src="${img.url}">`;
                carouselDiv.appendChild(item);
            });
            dmBody.appendChild(carouselDiv);
            dmBody.scrollTop = dmBody.scrollHeight;
        }

        function handleSend() {
            const input = document.getElementById('dmInput');
            if (!input.value) return;
            appendMessage(input.value, 'user');
            const val = input.value;
            input.value = '';
            setTimeout(() => {
                appendMessage("ありがとうございます！その点については、素材の『クタッと感』を活かしたスタイリングがバッチリ合いますよ。", 'agent');
            }, 1000);
        }

        function closeDM() {
            document.getElementById('dmLayer').classList.remove('active');
            document.getElementById('dmOverlay').classList.remove('active');
            document.getElementById('dmBody').innerHTML = '';
            document.getElementById('dmFooter').classList.remove('active');
        }
    </script>
</body>
</html>
